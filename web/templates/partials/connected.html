{{define "connected"}}
<div class="min-h-screen flex flex-col" id="app">
  <header class="bg-white border-b border-gray-200 px-4 lg:px-6 py-3 flex items-center justify-between gap-2">
    <div class="flex items-center gap-2 lg:gap-3 min-w-0">
      <button onclick="toggleSidebar()" class="lg:hidden p-1.5 -ml-1.5 rounded-lg hover:bg-gray-100 text-gray-500 transition-colors flex-shrink-0">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <span class="text-sm font-semibold text-gray-900 flex-shrink-0">DB Studio</span>
      <span class="text-xs text-gray-400 hidden sm:inline flex-shrink-0">/</span>
      <span class="badge-blue text-xs hidden sm:inline-flex flex-shrink-0">{{.Driver}}</span>
      <span class="text-sm text-gray-600 font-mono truncate min-w-0">{{.Label}}</span>
      {{if .Version}}
      <span class="text-xs text-gray-400 hidden lg:inline truncate min-w-0">{{.Version}}</span>
      {{end}}
    </div>
    <div class="flex items-center gap-2 flex-shrink-0">
      <button hx-post="/api/disconnect" hx-target="#app" hx-swap="outerHTML"
              class="btn-ghost text-xs">Disconnect</button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden relative">
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="sidebar-panel bg-white border-r border-gray-200 overflow-y-auto flex-shrink-0">
      <div class="p-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Schemas</h3>
          <span class="text-xs text-gray-400">{{len .Databases}}</span>
        </div>
        <div class="space-y-0.5" id="database-list">
          {{range .Databases}}
          <button onclick="if(window.innerWidth < 1024) toggleSidebar()"
                  hx-get="/api/tables?db={{.}}" hx-target="#main-area" hx-swap="innerHTML"
                  class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-100 transition-colors text-left">
            <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4" />
            </svg>
            <span class="truncate">{{.}}</span>
          </button>
          {{end}}
        </div>
      </div>
    </aside>

    <main class="flex-1 bg-gray-50 overflow-y-auto" id="main-area">
      <div class="p-4 lg:p-6 min-h-full">
        <div class="flex items-center justify-center h-64">
          <div class="text-center">
            <svg class="w-12 h-12 text-gray-300 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4" />
            </svg>
            <p class="text-sm text-gray-500">Select a schema to browse its tables</p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
{{end}}
